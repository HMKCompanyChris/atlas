// ═══════════════════════════════════════════════
//  PATH BUILDER STATE & FUNCTIONS
// ═══════════════════════════════════════════════
let currentPath = [];
let savedPaths = [];
let activePath = null; // When set, drawGraph highlights this path
// ═══════════════════════════════════════════════
// DIFFICULTY FILTERING (removed — all positions always shown)
// ═══════════════════════════════════════════════

function shouldShowPosition(position) {
  // If a path is active, only show positions in that path
  if (activePath) {
    return activePath.chain.some((item, i) => i % 2 === 0 && item.id === position.id);
  }

  // If a perspective is selected, only show positions that participate in edges of that perspective
  if (currentPerspective) {
    const visiblePositionIds = getVisiblePositionsForPerspective();
    return visiblePositionIds.has(position.id);
  }

  // Otherwise show all positions
  return true;
}

function openPaths(){
  const overlay = document.getElementById('pathOverlay');
  overlay.classList.add('open');
  renderPathBuilder();
}

function closePaths(){
  document.getElementById('pathOverlay').classList.remove('open');
  currentPath = [];
}

function renderPathBuilder(){
  const content = document.getElementById('pathContent');

  if(currentPath.length === 0){
    // Show saved paths first
    let html = '';
    if(savedPaths.length > 0){
      html = '<div class="path-options"><div class="path-section-title">Saved Paths</div>';
      savedPaths.forEach((sp, idx) => {
        html += `<div class="path-step">
          <div class="path-step-left">
            <div class="path-step-name">${sp.name}</div>
            <div class="path-step-label">${sp.chain.length} steps</div>
          </div>
          <span onclick="viewPathOnGraph(savedPaths[${idx}])" style="color:var(--accent);font-weight:600;cursor:pointer;font-size:12px">View →</span>
        </div>`;
      });
      html += '</div>';
      html += '<div class="path-options"><div class="path-section-title">Start New Path</div>';
    } else {
      html = '<div class="path-options"><div class="path-section-title">Start Position</div>';
    }

    // Show position selector
    positions.forEach(pos => {
      const color = TYPES[pos.type];
      html += `<div class="path-step" onclick="startPathFromPosition('${pos.id}')">
        <div class="path-step-left">
          <div class="path-step-name">${pos.name}</div>
          <div class="path-step-label">${pos.type}</div>
        </div>
        <div style="width:8px;height:8px;border-radius:4px;background:${color}"></div>
      </div>`;
    });
    html += '</div>';
    content.innerHTML = html;
  } else {
    // Show current path chain and options
    renderPathChain();
  }
}

function renderPathChain(){
  const content = document.getElementById('pathContent');
  const currentPos = currentPath[currentPath.length - 1];

  // Build chain display
  let chainHtml = '<div class="path-chain">';
  currentPath.forEach((item, idx) => {
    const isEdge = item.type === 'submission' || item.type === 'sweep' || item.type === 'transition';
    const color = isEdge ? EDGE_COLORS[item.type] : TYPES[item.type];
    chainHtml += `<div class="path-chain-item" style="border-color:${color};color:${color}">
      ${item.name}
    </div>`;
    if(idx < currentPath.length - 1) chainHtml += '<div style="color:var(--text-muted);padding:0 4px">→</div>';
  });
  chainHtml += '</div>';

  // Check if the previous move was a submission
  const lastEdge = currentPath.length >= 2 ? currentPath[currentPath.length - 2] : null;
  const justSubmitted = lastEdge && lastEdge.isSubmission === true;

  // Get available next techniques
  const availableEdges = edges.filter(e => e.from === currentPos.id);

  let html = chainHtml + '<div class="path-options">';

  // If we just hit a submission, show "Submitted!" option to end the path
  if(justSubmitted){
    html += `<div class="path-step" onclick="finishPathAsSubmission()" style="background:linear-gradient(135deg, #1a2d1a, #0d1b2a);border:2px solid var(--sub)">
      <div class="path-step-left">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:20px">🏆</span>
          <div>
            <div class="path-step-name" style="color:var(--sub);font-size:14px">Submitted! — End Path</div>
            <div class="path-step-label">${lastEdge.name} from ${currentPath.length >= 3 ? currentPath[currentPath.length - 3].name : 'start'}</div>
          </div>
        </div>
      </div>
    </div>`;
    html += '<div style="padding:6px 0 2px;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:1px">...or keep going</div>';
  }

  // Group by type
  const subs = availableEdges.filter(e => e.type === 'submission');
  const sweeps = availableEdges.filter(e => e.type === 'sweep');
  const trans = availableEdges.filter(e => e.type === 'transition');

  if(subs.length){
    html += '<div class="path-section-title">Submissions</div>';
    subs.forEach(e => {
      const dest = positions.find(p => p.id === e.to);
      html += `<div class="path-step" onclick="addToPath('${e.to}', '${e.label}', '${e.type}')">
        <div class="path-step-left">
          <div class="path-step-name" style="color:var(--sub)">${e.label}</div>
          <div class="path-step-label">→ ${dest.name}</div>
        </div>
        <span class="path-step-arrow">→</span>
      </div>`;
    });
  }

  if(sweeps.length){
    html += '<div class="path-section-title">Sweeps</div>';
    sweeps.forEach(e => {
      const dest = positions.find(p => p.id === e.to);
      html += `<div class="path-step" onclick="addToPath('${e.to}', '${e.label}', '${e.type}')">
        <div class="path-step-left">
          <div class="path-step-name" style="color:var(--sweep)">${e.label}</div>
          <div class="path-step-label">→ ${dest.name}</div>
        </div>
        <span class="path-step-arrow">→</span>
      </div>`;
    });
  }

  if(trans.length){
    html += '<div class="path-section-title">Transitions</div>';
    trans.forEach(e => {
      const dest = positions.find(p => p.id === e.to);
      html += `<div class="path-step" onclick="addToPath('${e.to}', '${e.label}', '${e.type}')">
        <div class="path-step-left">
          <div class="path-step-name" style="color:var(--transition)">${e.label}</div>
          <div class="path-step-label">→ ${dest.name}</div>
        </div>
        <span class="path-step-arrow">→</span>
      </div>`;
    });
  }

  html += '</div>';

  if(currentPath.length > 1){
    html += `<button class="path-action-btn" onclick="undoPathStep()" style="background:var(--surface2);color:var(--text-primary);border:1px solid var(--border)">← Back</button>`;
  }

  if(currentPath.length > 2){
    html += `<button class="path-action-btn" onclick="viewPathOnGraph({name:'Current',chain:[...currentPath]})" style="background:var(--accent);color:white">🗺️ View on Graph</button>`;
  }

  html += `<button class="path-action-btn" onclick="saveCurrentPath()">💾 Save Path</button>`;

  content.innerHTML = html;
}

function startPathFromPosition(posId){
  const pos = positions.find(p => p.id === posId);
  currentPath = [pos];
  renderPathBuilder();
}

function addToPath(posId, label, type){
  const pos = positions.find(p => p.id === posId);
  currentPath.push({id:posId, name:label, type:type, position:pos, isSubmission: type === 'submission'});
  currentPath.push(pos);
  renderPathBuilder();
}

function undoPathStep(){
  if(currentPath.length > 1){
    currentPath.pop(); // remove position
    currentPath.pop(); // remove edge
  } else {
    currentPath = [];
  }
  renderPathBuilder();
}

function restartPath(){
  currentPath = [];
  renderPathBuilder();
}

function finishPathAsSubmission(){
  const content = document.getElementById('pathContent');
  // Build final chain display
  let chainHtml = '<div class="path-chain">';
  currentPath.forEach((item, idx) => {
    const isEdge = item.type === 'submission' || item.type === 'sweep' || item.type === 'transition';
    const color = isEdge ? EDGE_COLORS[item.type] : TYPES[item.type];
    chainHtml += `<div class="path-chain-item" style="border-color:${color};color:${color}">${item.name}</div>`;
    if(idx < currentPath.length - 1) chainHtml += '<div style="color:var(--text-muted);padding:0 4px">→</div>';
  });
  chainHtml += '</div>';

  const lastEdge = currentPath.length >= 2 ? currentPath[currentPath.length - 2] : null;
  const fromPos = currentPath.length >= 3 ? currentPath[currentPath.length - 3] : null;

  let html = chainHtml;
  html += `<div style="text-align:center;padding:28px 0">
    <div style="font-size:36px;margin-bottom:8px">🏆</div>
    <div style="font-size:22px;font-weight:700;color:var(--sub);margin-bottom:4px">Submitted!</div>
    <div style="font-size:13px;color:var(--text-muted)">${lastEdge ? lastEdge.name : 'Submission'} from ${fromPos ? fromPos.name : 'position'}</div>
  </div>`;
  html += `<button class="path-action-btn" onclick="viewPathOnGraph({name:'Current',chain:[...currentPath]})" style="background:var(--accent);color:white">🗺️ View on Graph</button>`;
  html += `<button class="path-action-btn" onclick="saveCurrentPath()" style="background:var(--accent);color:white">💾 Save Path</button>`;
  html += `<button class="path-action-btn" onclick="undoPathStep()" style="background:var(--surface2);color:var(--text-primary);border:1px solid var(--border)">← Try a Different Finish</button>`;
  html += `<button class="path-action-btn" onclick="restartPath()" style="background:var(--surface2);color:var(--text-primary);border:1px solid var(--border)">🔄 Start New Path</button>`;

  content.innerHTML = html;
}

function saveCurrentPath(){
  if(currentPath.length > 1){
    const pathName = currentPath.map((item, idx) => {
      if(idx % 2 === 0 && item.name) return item.name;
      if(idx % 2 === 1 && item.name) return item.name;
      return '';
    }).filter(Boolean).join(' → ');

    savedPaths.push({name: pathName, chain: [...currentPath]});
    currentPath = [];
    renderPathBuilder();
  }
}

function viewPathOnGraph(path){
  closePaths();
  closeFocus();

  // Save original positions for restoration
  if (!window._savedPositions) {
    window._savedPositions = {};
    positions.forEach(p => {
      window._savedPositions[p.id] = { x: p.x, y: p.y };
    });
  }

  activePath = path;

  // Extract unique position nodes from chain (even indices), in order
  const pathNodes = [];
  const seen = new Set();
  path.chain.forEach((item, i) => {
    if (i % 2 === 0 && item.id && !seen.has(item.id)) {
      seen.add(item.id);
      pathNodes.push(item);
    }
  });

  // Layout horizontally with padding
  const W = window.innerWidth;
  const H = window.innerHeight;
  const padding = 150;
  const totalWidth = W - padding * 2;
  const spacing = pathNodes.length > 1 ? totalWidth / (pathNodes.length - 1) : 0;
  const centerY = H / 2;

  pathNodes.forEach((pathNode, i) => {
    const pos = positions.find(p => p.id === pathNode.id);
    if (pos) {
      pos.x = padding + (i * spacing);
      pos.y = centerY;
    }
  });

  // Reset pan/zoom to show full layout
  panX = 0;
  panY = 0;
  zoom = 1;

  // Hide the perspective toggle when viewing a saved path
  const toggle = document.getElementById('perspectiveToggle');
  if (toggle) toggle.style.display = 'none';

  drawGraph();
  showPathBanner();
}

function clearActivePath(){
  activePath = null;

  // Restore original positions
  if (window._savedPositions) {
    positions.forEach(p => {
      if (window._savedPositions[p.id]) {
        p.x = window._savedPositions[p.id].x;
        p.y = window._savedPositions[p.id].y;
      }
    });
    window._savedPositions = null;
  }

  // Show the perspective toggle when clearing the path view
  const toggle = document.getElementById('perspectiveToggle');
  if (toggle) toggle.style.display = 'flex';

  document.getElementById('pathBanner')?.remove();
  drawGraph();
}

function showPathBanner(){
  document.getElementById('pathBanner')?.remove();
  const banner = document.createElement('div');
  banner.id = 'pathBanner';
  banner.innerHTML = `<span style="font-weight:600">🔗 Path Active</span><span onclick="clearActivePath()" style="cursor:pointer;margin-left:12px;font-weight:600">✕ Clear</span>`;
  Object.assign(banner.style, {
    position:'fixed', top:'60px', left:'50%', transform:'translateX(-50%)',
    background:'var(--accent)', color:'white', padding:'8px 18px',
    borderRadius:'20px', fontSize:'13px', zIndex:'200',
    display:'flex', alignItems:'center', gap:'8px',
    boxShadow:'0 2px 12px rgba(0,0,0,0.15)'
  });
  document.body.appendChild(banner);
}

function hitGoal(idx){
  const goal = trainingGoals[idx];
  if(!goal || goal.completed) return;
  goal.count++;
  localStorage.setItem('bjj_goals', JSON.stringify(trainingGoals));

  if(goal.count >= goal.target){
    setTimeout(() => {
      if(confirm(`You've hit "${goal.name}" ${goal.target} times! Do you feel confident enough to move on to the next move?`)){
        goal.completed = true;
        goal.completedDate = new Date().toISOString().split('T')[0];
        localStorage.setItem('bjj_goals', JSON.stringify(trainingGoals));
      }
      renderGoalsView();
    }, 200);
  } else {
    renderGoalsView();
  }
}

function updateGoalOptions(){
  const type = document.getElementById('goalTypeSelect').value;
  const container = document.getElementById('goalMoveSelector');
  let html = '';

  if(type === 'custom'){
    html = `<div class="journal-field"><label>Goal Name</label><input type="text" id="goalCustomName" placeholder="e.g., Work on guard retention"></div>`;
  } else if(type === 'position'){
    html = '<div class="journal-field"><label>Position</label><select id="goalMoveSelect">';
    positions.forEach(p => { html += `<option value="${p.name}">${p.name}</option>`; });
    html += '</select></div>';
  } else {
    const typeEdges = [...new Set(edges.filter(e => e.type === type).map(e => e.label))].sort();
    html = `<div class="journal-field"><label>${type.charAt(0).toUpperCase()+type.slice(1)}</label><select id="goalMoveSelect">`;
    typeEdges.forEach(label => { html += `<option value="${label}">${label}</option>`; });

  }

  container.innerHTML = html;
}

function saveNewGoal(){
  const type = document.getElementById('goalTypeSelect').value;
  const target = parseInt(document.getElementById('goalTarget').value) || 10;
  const notes = document.getElementById('goalNotes').value;
  let name;

  if(type === 'custom'){
    name = document.getElementById('goalCustomName')?.value || 'Custom Goal';
  } else {
    name = document.getElementById('goalMoveSelect')?.value || type;
  }

  trainingGoals.push({
    name: name,
    goalType: type,
    count: 0,
    target: target,
    notes: notes,
    completed: false,
    createdDate: new Date().toISOString().split('T')[0]
  });

  localStorage.setItem('bjj_goals', JSON.stringify(trainingGoals));

}

function saveSessionAndPrompt(){
  saveJournalEntry();
  if(confirm('Session saved! Want to log another training session?')){
    // Reset to fresh entry on same date
    editingEntry = {date: journalDate, rating: 0, movesOfDay: '', notes: '', rounds: []};
    renderJournalEntry();
  } else {
    // Reset form to show saved state cleanly
    editingEntry = null;
    renderJournalEntry();
  }
}

function saveJournalEntry(){
  if(!editingEntry) return;
  const copy = JSON.parse(JSON.stringify(editingEntry));
  const idx = journalEntries.findIndex(e => e.date === journalDate);
  if(idx >= 0){
    journalEntries[idx] = copy;
  } else {
    journalEntries.push(copy);
  }
  localStorage.setItem('bjj_journal', JSON.stringify(journalEntries));
}

function getOpponentRecord(name){
  if(!name) return null;
  let got = 0, gave = 0;
  journalEntries.forEach(entry => {
    entry.rounds?.forEach(round => {
      if(round.opponent?.toLowerCase() === name.toLowerCase()){
        round.submissions?.forEach(sub => {
          if(sub.direction === 'got') got++;
          else if(sub.direction === 'gave') gave++;
        });
      }
    });
  });
  return got || gave ? {got, gave} : null;
}

function getKnownOpponents(){
  const names = new Set();
  journalEntries.forEach(entry => {
    entry.rounds?.forEach(round => {
      if(round.opponent && round.opponent.trim()) names.add(round.opponent.trim());
    });
  });
  // Also check current editing entry
  if(editingEntry){
    editingEntry.rounds?.forEach(round => {
      if(round.opponent && round.opponent.trim()) names.add(round.opponent.trim());
    });
  }
  return [...names].sort();
}

function computePartnerStats(){
  const partners = {};
  journalEntries.forEach(entry => {
    entry.rounds?.forEach(round => {
      const name = round.opponent && round.opponent.trim();
      if(!name) return;
      if(!partners[name]){
        partners[name] = {
          name: name,
          belt: round.belt || 'unknown',
          rounds: 0,
          subs: 0,
          gotCaught: 0,
          sweeps: 0,
          positions: new Set(),
          lastRolled: entry.date
        };
      }
      partners[name].rounds++;
      partners[name].lastRolled = new Date(entry.date) > new Date(partners[name].lastRolled) ? entry.date : partners[name].lastRolled;
      if(partners[name].belt === 'unknown' && round.belt) partners[name].belt = round.belt;
      round.submissions?.forEach(sub => {
        if(sub.direction === 'got') partners[name].subs++;
        else if(sub.direction === 'gave') partners[name].gotCaught++;
      });
      if(round.notes) partners[name].positions.add(round.notes.split(',')[0].trim());
    });
  });
  return Object.values(partners)
    .map(p => ({...p, positions: [...p.positions].filter(x => x.length > 0).slice(0, 3)}))
    .sort((a,b) => new Date(b.lastRolled) - new Date(a.lastRolled));
}

function openSubSelector(roundIdx, direction){
  const subs = [...new Set(edges.filter(e => e.type === 'submission').map(e => e.label))].sort();
  let modal = document.createElement('div');
  modal.className = 'move-selector-modal';
  modal.onclick = (ev) => { if(ev.target === modal) modal.remove(); };
  let html = '<div class="move-selector-content">';
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <strong style="font-size:16px">${direction === 'got' ? 'Submission You Got' : 'Submission You Gave Up'}</strong>
    <span onclick="this.closest('.move-selector-modal').remove()" style="cursor:pointer;font-size:20px">✕</span>
  </div>`;
  subs.forEach(sub => {
    html += `<div class="path-step" style="cursor:pointer" onclick="addSubToRound(${roundIdx},'${direction}','${sub.replace(/'/g,"\\'")}');this.closest('.move-selector-modal').remove()">
      <div class="path-step-left">
        <div class="path-step-name" style="color:var(--sub)">${sub}</div>

function addSubToRound(roundIdx, direction, subName){
  if(editingEntry && editingEntry.rounds[roundIdx]){
    if(!editingEntry.rounds[roundIdx].submissions) editingEntry.rounds[roundIdx].submissions = [];
    editingEntry.rounds[roundIdx].submissions.push({direction: direction, name: subName});
    saveJournalEntry();
    renderJournalEntry();
  }
}

function openChainBuilder(roundIdx){
  let chainState = [];

  function renderChainModal(){
    let modal = document.querySelector('.move-selector-modal.chain-modal');
    if(!modal){
      modal = document.createElement('div');
      modal.className = 'move-selector-modal chain-modal';
      modal.onclick = (ev) => { if(ev.target === modal) modal.remove(); };
      document.body.appendChild(modal);
    }

    let html = '<div class="move-selector-content" style="max-height:80vh;display:flex;flex-direction:column;padding:0">';
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:20px 20px 12px">
      <strong style="font-size:16px">Build Chain</strong>
      <span onclick="this.closest('.move-selector-modal').remove()" style="cursor:pointer;font-size:20px">✕</span>
    </div>`;
    html += '<div style="flex:1;overflow-y:auto;padding:0 20px">';

    // Show current chain
    if(chainState.length > 0){
      html += '<div class="move-chain-display">';
      chainState.forEach((item, idx) => {
        const isPos = idx % 2 === 0;
        const color = isPos ? (TYPES[item.type]||'#666') : (EDGE_COLORS[item.type]||'#666');
        html += `<span class="move-chain-item" style="border-color:${color};color:${color}">${item.name || item.label}</span>`;
        if(idx < chainState.length - 1) html += '<span class="chain-arrow">→</span>';
      });
      html += '</div>';
    }

    if(chainState.length === 0){
      // Pick starting position
      html += '<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Pick starting position:</div>';
      positions.forEach(pos => {
        const color = TYPES[pos.type];
        html += `<div class="path-step" style="cursor:pointer" onclick="window._chainAddPos('${pos.id}')">
          <div class="path-step-left">
            <div class="path-step-name">${pos.name}</div>
            <div class="path-step-label" style="color:${color}">${pos.type}</div>
          </div>
        </div>`;
      });
    } else if(chainState.length % 2 === 1){
      // Pick next technique from current position
      const currentPos = chainState[chainState.length - 1];
      const available = edges.filter(e => e.from === currentPos.id);

      if(available.length === 0){
        html += '<div style="padding:20px;text-align:center;color:var(--text-muted)">No techniques from this position</div>';
      } else {
        html += '<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Pick next technique:</div>';
        const byType = {submission:[], sweep:[], transition:[]};
        available.forEach(e => { if(byType[e.type]) byType[e.type].push(e); });

        Object.entries(byType).forEach(([type, arr]) => {
          if(arr.length === 0) return;
          const color = EDGE_COLORS[type];
          html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:${color};margin:8px 0 4px">${type}s</div>`;
          arr.forEach(e => {
            const dest = positions.find(p => p.id === e.to);
            html += `<div class="path-step" style="cursor:pointer" onclick="window._chainAddEdge('${e.to}','${e.label.replace(/'/g,"\\'")}','${e.type}')">
              <div class="path-step-left">
                <div class="path-step-name" style="color:${color}">${e.label}</div>
                <div class="path-step-label">→ ${dest ? dest.name : e.to}</div>
              </div>
              <span style="color:var(--text-muted)">→</span>
            </div>`;
          });
        });
      }
    }

    html += '</div>'; // close scrollable area

    // Action buttons — fixed footer outside scroll
    html += '<div style="display:flex;justify-content:space-between;gap:8px;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0">';
    if(chainState.length > 0){
      html += `<button class="add-btn" onclick="window._chainUndo()">← Undo</button>`;
    }
    if(chainState.length >= 3){
      html += `<button class="add-btn" onclick="window._chainSave(${roundIdx})" style="margin-left:auto;background:var(--primary);color:white;border-color:var(--primary);font-size:14px;padding:12px 24px">✓ Done</button>`;
    }
    html += '</div>';

    html += '</div>'; // close move-selector-content
    modal.innerHTML = html;
  }

  window._chainAddPos = function(posId){
    const pos = positions.find(p => p.id === posId);
    if(pos) chainState.push({id:pos.id, name:pos.name, type:pos.type});
    renderChainModal();
  };

  window._chainAddEdge = function(toId, label, type){
    chainState.push({label:label, type:type});
    const pos = positions.find(p => p.id === toId);
    if(pos) chainState.push({id:pos.id, name:pos.name, type:pos.type});
    renderChainModal();
  };

  window._chainUndo = function(){
    if(chainState.length > 1){ chainState.pop(); chainState.pop(); }
    else { chainState = []; }
    renderChainModal();
  };

  window._chainSave = function(rIdx){
    if(editingEntry && editingEntry.rounds[rIdx]){
      editingEntry.rounds[rIdx].chain = [...chainState];
      saveJournalEntry();
      renderJournalEntry();
    }
    document.querySelector('.move-selector-modal.chain-modal')?.remove();
  };

  renderChainModal();
}

        const next = BLACK_BELT_DEGREES[myProfile.blackBeltDegree + 1];
        html += `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">Next: ${next.title} (min ${next.minYears} years at current degree)</div>`;
      }
      html += '</div>';
    }

    // Higher ranks info
    html += `<div style="margin-top:16px;font-size:12px;color:var(--text-muted);line-height:1.6">
      <div style="font-weight:600;margin-bottom:4px;color:var(--text-primary)">Black Belt Progression (IBJJF)</div>
      <div>1st–3rd Degree: 3 years min each</div>
      <div>4th–6th Degree: 5 years min each</div>
      <div>7th Degree: Coral Belt (red/black) — 7 years</div>
      <div>8th Degree: Coral Belt (red/white) — 7 years</div>
      <div>9th Degree: Red Belt — 10 years</div>
      <div>10th Degree: Red Belt — Grand Master</div>
    </div>`;
    html += '</div>';
  }

  html += '</div>'; // close journal-section

  // Training start date
  html += '<div class="journal-section">';
  html += '<div class="journal-section-title">Training Since</div>';
  html += `<div class="journal-field">
    <input type="date" value="${myProfile.startDate}" onchange="myProfile.startDate=this.value;saveProfile();renderMe()" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text-primary);font-size:14px;box-sizing:border-box">
  </div>`;
  if(myProfile.startDate){
    const start = new Date(myProfile.startDate);
    const now = new Date();
    const diffMs = now - start;
    const years = Math.floor(diffMs / (365.25 * 24 * 60 * 60 * 1000));
    const months = Math.floor((diffMs % (365.25 * 24 * 60 * 60 * 1000)) / (30.44 * 24 * 60 * 60 * 1000));
    html += `<div style="font-size:14px;color:var(--primary);font-weight:600;margin-top:8px">${years > 0 ? years + ' year'+(years!==1?'s':'') + ', ' : ''}${months} month${months!==1?'s':''} on the mats</div>`;
  }
  html += '</div>';

  // Promotion history
  html += '<div class="journal-section">';
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="journal-section-title" style="margin-bottom:0">Promotion History</div>
    <button class="add-btn" onclick="addPromotion()" style="padding:4px 12px;font-size:11px">+ Add</button>
  </div>`;

  if(myProfile.promotions.length === 0){
    html += '<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px">No promotions logged yet</div>';
  } else {
    // Show newest first
    [...myProfile.promotions].reverse().forEach((promo, i) => {
      const ridx = myProfile.promotions.length - 1 - i;
      const pCol = BELT_HEX[promo.belt] || 'var(--border)';
      const promoDate = promo.date ? new Date(promo.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'No date';
      // Time at this belt
      let timeAtBelt = '';
      if(promo.date){
        const nextPromo = myProfile.promotions[ridx + 1];
        const endDate = nextPromo?.date ? new Date(nextPromo.date) : new Date();
        const diffMs = endDate - new Date(promo.date);
        const yrs = Math.floor(diffMs / (365.25*24*60*60*1000));
        const mos = Math.floor((diffMs % (365.25*24*60*60*1000)) / (30.44*24*60*60*1000));
        timeAtBelt = yrs > 0 ? yrs+'y '+mos+'m' : mos+'m';
      }
      html += `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border:1px solid var(--border);border-left:4px solid ${pCol};border-radius:10px;margin-bottom:6px">
        <div style="width:32px;height:10px;border-radius:2px;background:${pCol};flex-shrink:0;border:${promo.belt==='white'?'1px solid #CCC':'none'}"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary)">${promo.belt.charAt(0).toUpperCase()+promo.belt.slice(1)} Belt${promo.stripes?' ('+promo.stripes+' stripe'+(promo.stripes!==1?'s':'')+')':''}</div>
          <div style="font-size:11px;color:var(--text-muted)">${promoDate}${timeAtBelt ? ' · '+timeAtBelt : ''}</div>
        </div>
        <span onclick="myProfile.promotions.splice(${ridx},1);saveProfile();renderMe()" style="cursor:pointer;color:var(--text-muted);font-size:16px">×</span>
      </div>`;
    });
  }
  html += '</div>';

  // Injury tracking
  html += '<div class="journal-section">';
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="journal-section-title" style="margin-bottom:0">Injuries</div>
    <button class="add-btn" onclick="addInjury()" style="padding:4px 12px;font-size:11px">+ Add</button>
  </div>`;

  const activeInjuries = myProfile.injuries.filter(inj => !inj.resolved);
  const pastInjuries = myProfile.injuries.filter(inj => inj.resolved);

  if(activeInjuries.length > 0){
    html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--sub);margin-bottom:6px">Active</div>';
    activeInjuries.forEach(inj => {
      const injIdx = myProfile.injuries.indexOf(inj);
      const daysSince = inj.date ? Math.floor((new Date() - new Date(inj.date)) / (24*60*60*1000)) : 0;
      const injDateFmt = inj.date ? new Date(inj.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
      html += `<div style="padding:12px;background:#B5352A08;border:1px solid #B5352A33;border-radius:10px;margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;color:var(--sub)">${inj.bodyPart || 'Injury'}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${inj.description || ''}</div>
            <div style="display:flex;gap:12px;margin-top:6px">
              <div style="font-size:11px"><span style="color:var(--sub);font-weight:600">Injured:</span> <span style="color:var(--text-muted)">${injDateFmt}</span></div>
              <div style="font-size:11px;color:var(--text-muted)">${daysSince} days out</div>
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <span onclick="markHealed(${injIdx})" style="cursor:pointer;font-size:11px;color:var(--sweep);font-weight:600;padding:4px 8px;border:1px solid var(--sweep);border-radius:6px">Returned</span>
            <span onclick="myProfile.injuries.splice(${injIdx},1);saveProfile();renderMe()" style="cursor:pointer;color:var(--text-muted);font-size:16px">×</span>
          </div>
        </div>
      </div>`;
    });
  }

  if(pastInjuries.length > 0){
    html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin:12px 0 6px">Past</div>';
    pastInjuries.forEach(inj => {
      const injIdx = myProfile.injuries.indexOf(inj);
      const recoveryDays = inj.date && inj.resolvedDate ? Math.floor((new Date(inj.resolvedDate) - new Date(inj.date)) / (24*60*60*1000)) : 0;
      const injD = inj.date ? new Date(inj.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
      const retD = inj.resolvedDate ? new Date(inj.resolvedDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
      html += `<div style="padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;opacity:0.7">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:12px;font-weight:600;color:var(--text-primary)">${inj.bodyPart || 'Injury'}</div>
          <span onclick="myProfile.injuries.splice(${injIdx},1);saveProfile();renderMe()" style="cursor:pointer;color:var(--text-muted);font-size:14px">×</span>
        </div>
        <div style="display:flex;gap:12px;margin-top:4px;font-size:11px">
          <div><span style="color:var(--sub);font-weight:600">Injured:</span> <span style="color:var(--text-muted)">${injD}</span></div>
          <div><span style="color:var(--sweep);font-weight:600">Returned:</span> <span style="color:var(--text-muted)">${retD}</span></div>
          <div style="color:var(--text-muted)">${recoveryDays}d recovery</div>
        </div>
      </div>`;
    });
  }

  if(myProfile.injuries.length === 0){
    html += '<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:13px">No injuries logged — stay healthy!</div>';
  }
  html += '</div>';

  // ── FRIENDS SECTION (only if logged in) ──
  if(firebaseConfigured && currentUser){
    html += renderFriendsSection();
  }

  body.innerHTML = html;

  // Load friends if logged in
  if(firebaseConfigured && currentUser){
    loadFriends();
  }
}

// Auth handlers
async function handleSignIn(){
  const email = document.getElementById('authEmail')?.value;
  const password = document.getElementById('authPassword')?.value;
  if(!email || !password){ authError = 'Please fill in all fields'; renderMe(); return; }
  authLoading = true; authError = ''; renderMe();
  const result = await signInWithEmail(email, password);
  authLoading = false;
  if(!result.success){ authError = result.error; renderMe(); }
}

async function handleCreateAccount(){
  const name = document.getElementById('authName')?.value;
  const email = document.getElementById('authEmail')?.value;
  const password = document.getElementById('authPassword')?.value;
  if(!name || !email || !password){ authError = 'Please fill in all fields'; renderMe(); return; }
  authLoading = true; authError = ''; renderMe();
  const result = await createAccount(email, password, name);
  authLoading = false;
  if(!result.success){ authError = result.error; renderMe(); }
}

async function handleResetPassword(){
  const email = document.getElementById('authEmail')?.value;
  if(!email){ authError = 'Please enter your email'; renderMe(); return; }
  authLoading = true; authError = ''; renderMe();
  const result = await resetPassword(email);
  authLoading = false;
  authError = result.success ? 'Reset link sent! Check your email.' : result.error;
  renderMe();
}

let searchTimeout;
function handleFriendSearch(query){
  clearTimeout(searchTimeout);
  if(query.length < 2){
    document.getElementById('friendSearchResults').innerHTML = '';
    return;
  }
  searchTimeout = setTimeout(async () => {
    const results = await searchUsers(query);
    const container = document.getElementById('friendSearchResults');
    if(!container) return;
    if(results.length === 0){
      container.innerHTML = '<div style="padding:8px;font-size:13px;color:var(--text-muted)">No users found</div>';
      return;
    }
    let html = '';
    results.forEach(u => {
      const isFriend = friendsList.some(f => f.uid === u.uid);
      const uBeltCol = BELT_HEX[u.belt] || '#CCC';
      html += `<div style="display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:4px">
        <div style="width:32px;height:32px;border-radius:50%;background:${uBeltCol}22;border:2px solid ${uBeltCol};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${uBeltCol}">${(u.displayName||'?').charAt(0).toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary)">${u.displayName}</div>
          <div style="font-size:11px;color:var(--text-muted)">${u.belt ? u.belt.charAt(0).toUpperCase()+u.belt.slice(1)+' Belt' : ''}</div>
        </div>
        ${isFriend

function getGoalInsights(goal){
  const insights = [];
  const name = goal.name;
  const type = goal.goalType;

  if(type === 'submission'){
    const subEdge = edges.find(e => e.type === 'submission' && e.label === name);
    if(subEdge){
      const fromPos = positions.find(p => p.id === subEdge.from);
      const entryEdges = edges.filter(e => e.to === subEdge.from && e.type === 'transition');
      const entryNames = entryEdges.slice(0,3).map(e => {
        const src = positions.find(p => p.id === e.from);
        return src ? e.label + ' from ' + src.name : e.label;
      });

      if(fromPos){
        insights.push({
          icon: '🎯',
          title: 'Set it up from ' + fromPos.name,
          detail: 'Drill getting to ' + fromPos.name + ' first. The sub is only as good as your positional control.'
        });
      }

      if(entryNames.length > 0){
        insights.push({
          icon: '🔗',
          title: 'Chain into it',
          detail: 'Entry paths: ' + entryNames.join(', ') + '. Build a sequence that flows into the finish.'
        });
      }

      const altSubs = edges.filter(e => e.from === subEdge.from && e.type === 'submission' && e.label !== name);
      if(altSubs.length > 0){
        insights.push({
          icon: '🔄',
          title: 'Create dilemmas',
          detail: 'Also threaten ' + altSubs.slice(0,3).map(e=>e.label).join(', ') + ' from the same spot. If they defend one, hit the other.'
        });
      }
    }
    insights.push({
      icon: '⏱️',
      title: 'Control before you submit',
      detail: 'Hold the position for 5 seconds before attacking. Rushing the sub gives them escape windows.'
    });

  } else if(type === 'sweep'){
    const sweepEdge = edges.find(e => e.type === 'sweep' && e.label === name);
    if(sweepEdge){
      const fromPos = positions.find(p => p.id === sweepEdge.from);
      const toPos = positions.find(p => p.id === sweepEdge.to);

      if(fromPos){
        insights.push({
          icon: '🎯',
          title: 'Start from strong grips',
          detail: 'In ' + fromPos.name + ', establish your grips before initiating. The sweep starts with hand fighting.'
        });
      }
      if(toPos){
        const followUps = edges.filter(e => e.from === sweepEdge.to).slice(0,3);
        if(followUps.length > 0){
          insights.push({
            icon: '⬆️',
            title: 'Land in ' + toPos.name + ' — then attack',
            detail: 'Follow up with: ' + followUps.map(e=>e.label).join(', ') + ". Don't just sweep and stall."
          });
        }
      }
      const altSweeps = edges.filter(e => e.from === sweepEdge.from && e.type === 'sweep' && e.label !== name);
      if(altSweeps.length > 0){
        insights.push({
          icon: '🔄',
          title: 'Combo sweeps',
          detail: 'If they base out, switch to ' + altSweeps.slice(0,2).map(e=>e.label).join(' or ') + '. Make them pick their poison.'
        });
      }
    }
    insights.push({
      icon: '💡',
      title: 'Off-balance first',
      detail: 'Push-pull to break their base before you commit. A sweep against a balanced opponent will stall.'
    });

  } else if(type === 'position'){
    const pos = positions.find(p => p.name === name);
    if(pos){
      const entries = edges.filter(e => e.to === pos.id && e.type === 'transition');
      const attacks = edges.filter(e => e.from === pos.id && e.type === 'submission');

      if(entries.length > 0){
        insights.push({
          icon: '🚪',
          title: 'Ways in',
          detail: entries.slice(0,4).map(e => {
            const src = positions.find(p => p.id === e.from);
            return e.label + (src ? ' (from '+src.name+')' : '');
          }).join(', ')
        });
      }
      if(attacks.length > 0){
        insights.push({
          icon: '⚔️',
          title: 'Attacks from here',
          detail: attacks.map(e=>e.label).join(', ') + '. Cycle through these to keep them reacting.'
        });
      }
      const isTop = pos.type === 'top' || pos.type === 'back';
      insights.push({
        icon: '🧱',
        title: isTop ? 'Maintain pressure' : 'Control the distance',
        detail: isTop
          ? 'Focus on holding the position 30+ seconds before attacking. Pressure makes them give up subs.'
          : 'Keep frames active and manage grips. Re-guard or attack from a strong structure.'
      });
    }

  } else if(type === 'transition'){
    const transEdge = edges.find(e => e.type === 'transition' && e.label === name);
    if(transEdge){
      const fromPos = positions.find(p => p.id === transEdge.from);
      const toPos = positions.find(p => p.id === transEdge.to);
      if(fromPos && toPos){
        insights.push({
          icon: '🎯',
          title: fromPos.name + ' → ' + toPos.name,
          detail: 'Drill the entry. Speed and timing matter more than strength on transitions.'
        });
        const toAttacks = edges.filter(e => e.from === transEdge.to && e.type === 'submission');
        if(toAttacks.length > 0){
          insights.push({
            icon: '⚔️',
            title: 'Attack immediately on arrival',
            detail: 'Once in ' + toPos.name + ', go for ' + toAttacks.slice(0,3).map(e=>e.label).join(', ') + ' before they settle.'
          });
        }
      }
    }
    insights.push({
      icon: '💡',
      title: 'Drill in reps',
      detail: "Transitions are about muscle memory. Do 20 reps each side during warmups until it\'s automatic."
    });

  } else {
    insights.push({
      icon: '📋',
      title: 'Break it down',
      detail: 'Identify the 2-3 key movements that make this work. Isolate and drill each one separately.'
    });
    insights.push({
      icon: '🎥',
      title: 'Study footage',
      detail: 'Watch high-level competitors use this technique. Note their grip placement and timing.'
    });
  }

  return insights;
}

function countAllSubs(direction){
  let count = 0;
  journalEntries.forEach(e => {
    e.rounds?.forEach(r => {
      r.submissions?.forEach(s => { if(s.direction === direction) count++; });
    });
  });
  return count;
}

function getAllOpponentStats(){
  const map = {};
  journalEntries.forEach(entry => {
    entry.rounds?.forEach(round => {
      if(!round.opponent || !round.opponent.trim()) return;
      const name = round.opponent.trim();
      if(!map[name]) map[name] = {name, belt:round.belt||'', rounds:0, got:0, gave:0};
      map[name].rounds++;
      if(round.belt && !map[name].belt) map[name].belt = round.belt;
      round.submissions?.forEach(sub => {
        if(sub.direction === 'got') map[name].got++;
        else if(sub.direction === 'gave') map[name].gave++;
      });
    });
  });
  return Object.values(map).sort((a,b) => b.rounds - a.rounds);
}

let pageStack = [];

function openFullpage(title, renderFn) {
  closeNavSidebar();
  const overlay = document.getElementById('fullpageOverlay');
  document.getElementById('fullpageTitle').textContent = title;
  renderFn(document.getElementById('fullpageBody'));
  overlay.classList.add('open');
  // Hide the perspective toggle when opening fullpage views
  const toggle = document.getElementById('perspectiveToggle');
  if (toggle) toggle.style.display = 'none';
  pageStack.push({title, renderFn});
}
function closeFullpage() {
  pageStack.pop();
  if (pageStack.length > 0) {
    const prev = pageStack[pageStack.length - 1];
    document.getElementById('fullpageTitle').textContent = prev.title;
    prev.renderFn(document.getElementById('fullpageBody'));
  } else {

// NEW FEATURE 1: SAVED PATHS
// ═══════════════════════════════════════════════
currentPath = [];

function savePath(){
  if(currentPath.length<2) return alert('Follow at least 2 positions to save a path');
  const pathName = prompt('Name this path:');
  if(!pathName) return;
  const path = {
    id: Date.now(),
    name: pathName,
    positions: [...currentPath]
  };
  savedPaths.push(path);
  currentPath = [];
  alert('Path saved!');
}

function renderPathsView(){
  let html = savedPaths.length===0 ? '<div style="padding:16px;text-align:center;color:var(--text-muted);">No saved paths yet. Explore the graph and save your favorite chains.</div>' : '';

  savedPaths.forEach(path => {
    html += '<div class="path-card" onclick="highlightPath('+path.id+')">';
    html += '<div style="font-weight:600;margin-bottom:8px;">'+path.name+'</div>';
    html += '<div class="path-chain">';
    path.positions.forEach((posId,i) => {
      const pos = positions.find(p => p.id===posId);
      if(pos){
        const typeClass = pos.type || 'neutral';
        html += '<span class="path-badge '+typeClass+'">'+pos.name+'</span>';
        if(i<path.positions.length-1) html += '<span class="path-arrow">→</span>';
      }
    });
    html += '</div>';
    html += '<div class="path-actions"><button class="path-remove-btn" onclick="removePath('+path.id+',event)">Remove</button></div>';
    html += '</div>';
  });

  document.getElementById('pathsContent').innerHTML = html;
}

function removePath(id,e){
  e.stopPropagation();
  savedPaths = savedPaths.filter(p => p.id!==id);
  renderPathsView();
}

function highlightPath(id){
  const path = savedPaths.find(p => p.id===id);
  if(!path) return;
  document.querySelectorAll('.path-card').forEach(el => el.style.opacity='0.5');
  event.currentTarget.style.opacity='1';
}

// NEW FEATURE 2: MY GAME
// ═══════════════════════════════════════════════
let myGamePositions = new Set();

function openMyGame(){
  renderMyGame();
  document.getElementById('gameModal').classList.add('open');
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
}

function toggleMyGamePosition(posId){
  if(myGamePositions.has(posId)){
    myGamePositions.delete(posId);
  } else {
    myGamePositions.add(posId);
  }
  renderMyGame();
}

function renderMyGame(){
  const typeGroups = {};

  positions.forEach(pos => {
    if(!typeGroups[pos.type]) typeGroups[pos.type] = [];
    typeGroups[pos.type].push(pos);
  });

  let html = '';
  Object.keys(typeGroups).forEach(type => {
    html += '<div class="game-section">';
    html += '<div class="game-section-title">'+type+'</div>';
    html += '<div class="game-positions">';
    typeGroups[type].forEach(pos => {
      const marked = myGamePositions.has(pos.id) ? 'marked' : '';
      html += '<div class="game-position-card '+marked+'" onclick="toggleMyGamePosition(\''+pos.id+'\')">';
      html += '<div class="game-position-name">'+pos.name+'</div>';
      html += '<div class="game-position-type">'+type+'</div>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  document.getElementById('gameContent').innerHTML = html;
}

// NEW FEATURE 3: TRAINING PLAN WITH NOTES
// ═══════════════════════════════════════════════
let trainingNotes = new Map();

function openTrainingPlan(){
  renderTrainingPlan();
  document.getElementById('planModal').classList.add('open');
}

function renderTrainingPlan(){
  if(selectedPositions.size===0){
    document.getElementById('planContent').innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);">Select positions from the graph to build your training plan.';
    return;
  }

  let html = '';
  selectedPositions.forEach(posId => {
    const pos = positions.find(p => p.id===posId);
    if(!pos) return;

    const note = trainingNotes.get(posId) || '';
    const techniques = edges.filter(e => (e.from===posId || e.to===posId) && e.type!=='transition').map(e => e.label).join(', ');

    html += '<div class="plan-item">';
    html += '<div class="plan-item-header">';
    html += '<div class="plan-item-name">'+pos.name+'</div>';
    html += '<button class="plan-remove-btn" onclick="removePlanPosition(\''+posId+'\')">✕</button>';
    html += '</div>';
    html += '<textarea class="plan-textarea" placeholder="Notes..." onchange="updatePlanNote(\''+posId+'\',this.value)">'+note+'</textarea>';
    if(techniques){
      html += '<div class="plan-techniques"><strong>Techniques:</strong> '+techniques.split(',').map(t => '<span class="plan-technique-tag">'+t.trim()+'</span>').join('')+'</div>';
    }
    html += '</div>';
  });

  document.getElementById('planContent').innerHTML = html;
}

function removePlanPosition(posId){
  selectedPositions.delete(posId);
  trainingNotes.delete(posId);
  renderTrainingPlan();
}

function updatePlanNote(posId, note){
  trainingNotes.set(posId, note);
}

// NEW FEATURE 4: ONBOARDING INTRO CARDS
// ═══════════════════════════════════════════════
let onboardingShown = false;
let currentOnboardingCard = 0;
const onboardingCards = [
  {icon:'👋', title:'Welcome to Grapple Flow', text:'Explore a complete graph of jiu-jitsu positions and transitions. Tap any position to learn.'},
  {icon:'🕸️', title:'Navigate the Graph', text:'Drag to pan, pinch to zoom. Click a position to see details and techniques.'},
  {icon:'📚', title:'Learn Techniques', text:'Each position shows submissions, sweeps, and transitions with step-by-step instructions.'},
  {icon:'🎯', title:'Build Your Game', text:'Mark favorites, save training plans with notes, and track your jiu-jitsu journey.'}
];

function showOnboarding(){
  if(onboardingShown) return;
  onboardingShown = true;
  currentOnboardingCard = 0;
  updateOnboardingCard();
  document.getElementById('onboardingContainer').style.display = 'flex';
}

function updateOnboardingCard(){
  const card = onboardingCards[currentOnboardingCard];
  document.getElementById('onboardingIcon').textContent = card.icon;
  document.getElementById('onboardingTitle').textContent = card.title;
  document.getElementById('onboardingText').textContent = card.text;

  const btnBack = document.getElementById('onboardingBack');
  const btnNext = document.getElementById('onboardingBtn');

  btnBack.style.display = currentOnboardingCard>0 ? 'block' : 'none';
  btnNext.textContent = currentOnboardingCard===onboardingCards.length-1 ? 'Get Started' : 'Next';
}

function nextOnboarding(){
  if(currentOnboardingCard < onboardingCards.length-1){
    currentOnboardingCard++;
    updateOnboardingCard();
  } else {
    document.getElementById('onboardingContainer').style.display = 'none';
  }
}

function prevOnboarding(){
  if(currentOnboardingCard > 0){
    currentOnboardingCard--;
    updateOnboardingCard();
  }
}

// NEW FEATURE 5: GLOSSARY
// ═══════════════════════════════════════════════
const glossaryTerms = [
  {term:'Armbar', def:'Joint lock hyperextending elbow by trapping arm over hip or thigh.'},
  {term:'Back Control', def:'Dominant position controlling opponent from behind with seat belt grip and hooks.'},
  {term:'Bridge', def:'Hip escape technique pushing hips up to create space and escape bottom side control.'},
  {term:'Closed Guard', def:'Bottom position where both feet locked behind opponent back, trapping them.'},
  {term:'Crucifix', def:'Top position where both opponent arms trapped between legs, completely immobilized.'},
  {term:'De La Riva Guard', def:'Open guard hook variation controlling leg and posture for sweeping.'},
  {term:'Guard', def:'Bottom position where legs control opponent between you and ground.'},
  {term:'Guard Pass', def:'Technique to move from guard to dominant position like side control or mount.'},
  {term:'Heel Hook', def:'Leg lock targeting heel and ankle joint by rotating foot against knee.'},
  {term:'Hook', def:'Control point on opponent hip or leg from back control for stability.'},
  {term:'Knee on Belly', def:'Transitional top position with knee on opponent midsection.'},
  {term:'Mount', def:'Top dominant position straddling opponent torso with knees on sides.'},
  {term:'Open Guard', def:'Bottom position using feet and legs to control without locked ankle.'},
  {term:'Rear Naked Choke', def:'Submission from back control wrapping arm across neck in choking grip.'},
  {term:'Side Control', def:'Top dominant position perpendicular to opponent body with chest contact.'},
  {term:'Sweep', def:'Reversal technique from bottom position to go top to bottom.'},
  {term:'Takedown', def:'Technique to bring standing opponent to ground, scoring points.'},
  {term:'Triangle', def:'Submission where legs form triangle around neck and arm, cutting flow.'},
  {term:'Turtle', def:'Defensive bottom position on hands and knees, protecting your back.'},
  {term:'Underhook', def:'Control grip under opponent arm from grip fight or transition.'}
];

function openGlossary(){
  renderGlossary();
  document.getElementById('glossaryModal').classList.add('open');
}

function renderGlossary(){
  const sorted = [...glossaryTerms].sort((a,b) => a.term.localeCompare(b.term));
  let html = '';
  sorted.forEach(item => {
    html += '<div class="glossary-item"><div class="glossary-term">'+item.term+'</div><div class="glossary-definition">'+item.def+'</div></div>';
  });
  document.getElementById('glossaryContent').innerHTML = html;
}

function filterGlossary(){
  const query = document.getElementById('glossarySearch').value.toLowerCase();
  const filtered = glossaryTerms.filter(item => item.term.toLowerCase().includes(query) || item.def.toLowerCase().includes(query));
  const sorted = filtered.sort((a,b) => a.term.localeCompare(b.term));
  let html = '';
  sorted.forEach(item => {
    html += '<div class="glossary-item"><div class="glossary-term">'+item.term+'</div><div class="glossary-definition">'+item.def+'</div></div>';
  });
  document.getElementById('glossaryContent').innerHTML = html;
}

  <div class="fullpage-body" id="fullpageBody"></div>
</div>

<!-- ONBOARDING -->
<div class="onboarding-container" id="onboardingContainer" style="display:none;">
  <div class="onboarding-card">
    <div class="onboarding-icon" id="onboardingIcon">👋</div>
    <div class="onboarding-title" id="onboardingTitle">Welcome</div>
    <div class="onboarding-text" id="onboardingText">Explore the positions, build your game, and track your training</div>
    <div class="onboarding-buttons">
      <button class="onboarding-btn secondary" onclick="prevOnboarding()" id="onboardingBack" style="display:none;">Back</button>
      <button class="onboarding-btn primary" onclick="nextOnboarding()" id="onboardingBtn">Next</button>
    </div>
  </div>
</div>

<!-- PATHS MODAL -->
<div class="modal-overlay" id="pathsModal" onclick="if(event.target===this)closeModal('pathsModal')">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">Saved Paths</div>
      <button class="modal-close" onclick="closeModal('pathsModal')">✕</button>
    </div>
    <div id="pathsContent" class="paths-grid"></div>
  </div>
</div>

<!-- MY GAME MODAL -->
<div class="modal-overlay" id="gameModal" onclick="if(event.target===this)closeModal('gameModal')">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">My Game</div>
      <button class="modal-close" onclick="closeModal('gameModal')">✕</button>
    </div>
    <div id="gameContent"></div>
  </div>
</div>

<!-- TRAINING PLAN MODAL -->
<div class="modal-overlay" id="planModal" onclick="if(event.target===this)closeModal('planModal')">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">Training Plan</div>
      <button class="modal-close" onclick="closeModal('planModal')">✕</button>
    </div>
    <div id="planContent"></div>
  </div>
</div>

<!-- GLOSSARY MODAL -->
<div class="modal-overlay" id="glossaryModal" onclick="if(event.target===this)closeModal('glossaryModal')">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-title">Glossary</div>
      <button class="modal-close" onclick="closeModal('glossaryModal')">✕</button>
    </div>
    <input type="text" class="glossary-search" id="glossarySearch" placeholder="Search glossary..." onkeyup="filterGlossary()">
    <div class="glossary-grid" id="glossaryContent"></div>
  </div>
</div>

</body>
</html>
